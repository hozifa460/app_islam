name: islamic_app
description: تطبيق إسلامي شامل

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependency_overrides:
  flutter_native_timezone:
    path: packages/flutter_native_timezone

dependencies:
  flutter:
    sdk: flutter



  gap: ^3.0.1
  android_alarm_manager_plus: ^4.0.4
  path: ^1.8.3
  flutter_timezone: ^3.0.1
  adhan: ^2.0.0
  flutter_map: ^6.1.0       # لإظهار الخرائط
  latlong2: ^0.9.0          # لتحديد الإحداثيات
  cached_network_image: ^3.3.1
  flutter_pdfview: ^1.3.2
  dio: ^5.4.0  # ✅ مكتبة ممتازة ومستقرة لتحميل الملفات
  flutter_inappwebview: ^6.0.0
  flutter_local_notifications: ^17.2.2 # لإنشاء الإشعارات
  timezone: ^0.9.4                     # لضبط أوقات الإشعارات بدقة
  video_player: ^2.8.6  # ✅ مكتبة تشغيل الفيديوهات
  flutter_qiblah: ^3.1.0+1  # ✅ مكتبة القبلة
  flutter_launcher_icons: ^0.13.1
  permission_handler: ^11.0.1
  share_plus: ^7.2.1
  youtube_player_flutter: ^9.1.3  # ✅ مكتبة يوتيوب
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.4
  http: ^1.2.2
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1
  hijri: ^3.0.0
  path_provider: ^2.1.2
  just_audio: ^0.9.40
  geolocator: ^13.0.1  # لتحديد الإحداثيات
  geocoding: ^3.0.0    # لمعرفة اسم المدينة
  speech_to_text: ^7.0.0
flutter_native_splash:
    color: "#FFFFFF"
    image: "assets/logo/logo.png"
    android_12:
        image: "assets/logo/logo.png"
        icon_background_color: "#FFFFFF"


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true


  assets:
    - assets/data/quran.json
    - assets/icon/
    - assets/books/
    - assets/adahn/
    - assets/adahn_images/
    - assets/font/kfgqpc-hafs-uthmanic-script.ttf
    - assets/quran_pages/

flutter_launcher_icons:
  android: true       # 👈 استخدم true بدلاً من اسم مخصص لضمان استبدال القديمة
  ios: true
  image_path: "assets/icon/icon.png" # 👈 تأكد أن هذا المسار صحيح 100%
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/icon.png"